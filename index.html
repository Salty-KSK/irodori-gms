<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="カメラマンのための総合管理システム - 顧客、案件、機材、収支をまとめて管理">
  <meta name="theme-color" content="#1A73E8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GMS">
  <title>GMS - カメラマン総合管理システム</title>
  <link rel="stylesheet" href="css/index.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>">
</head>
<body>
  <!-- ============================================================
       Login Screen
       ============================================================ -->
  <div class="login-screen" id="loginScreen">
    <div class="login-container">
      <div class="login-card">
        <div class="login-logo">
          <div class="login-logo-icon">
            <span class="material-symbols-outlined">photo_camera</span>
          </div>
          <h1 class="login-title">GMS</h1>
          <p class="login-subtitle">カメラマン総合管理システム</p>
        </div>
        <p class="login-description">
          顧客・案件・機材・収支をまとめて管理。<br>
          Googleアカウントでログインしてください。
        </p>
        <button class="login-btn" id="googleLoginBtn">
          <svg class="login-google-icon" viewBox="0 0 24 24" width="20" height="20">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span class="login-btn-text">Googleでログイン</span>
        </button>
        <p class="login-error" id="loginError" style="display:none;"></p>
      </div>
      <p class="login-footer">IRODORI Photography &copy; 2026</p>
    </div>
  </div>

  <!-- ============================================================
       App Shell (初期状態は非表示)
       ============================================================ -->
  <div class="app-shell" id="app" style="display:none;">
    <!-- Sidebar Overlay (Mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="sidebar-logo-icon">
            <span class="material-symbols-outlined">photo_camera</span>
          </div>
          <div>
            <div class="sidebar-logo-text">GMS</div>
            <div class="sidebar-logo-sub">総合管理システム</div>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav" id="sidebarNav">
        <div class="sidebar-section">
          <div class="sidebar-section-title">メイン</div>
          <button class="sidebar-item" data-route="/" data-page="dashboard">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="item-label">ダッシュボード</span>
          </button>
          <button class="sidebar-item" data-route="/clients" data-page="clients">
            <span class="material-symbols-outlined">group</span>
            <span class="item-label">顧客リスト</span>
          </button>
          <button class="sidebar-item" data-route="/suppliers" data-page="suppliers">
            <span class="material-symbols-outlined">store</span>
            <span class="item-label">仕入れ先リスト</span>
          </button>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-section-title">管理</div>
          <button class="sidebar-item" data-route="/projects" data-page="projects">
            <span class="material-symbols-outlined">assignment</span>
            <span class="item-label">進捗管理</span>
          </button>
          <button class="sidebar-item" data-route="/bookings" data-page="bookings">
            <span class="material-symbols-outlined">event</span>
            <span class="item-label">予約管理</span>
          </button>
          <button class="sidebar-item" data-route="/finance" data-page="finance">
            <span class="material-symbols-outlined">account_balance_wallet</span>
            <span class="item-label">収支管理</span>
          </button>
          <button class="sidebar-item" data-route="/equipment" data-page="equipment">
            <span class="material-symbols-outlined">camera</span>
            <span class="item-label">機材リスト</span>
          </button>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-section-title">ロケ・コンテンツ</div>
          <button class="sidebar-item" data-route="/locations" data-page="locations">
            <span class="material-symbols-outlined">location_on</span>
            <span class="item-label">ロケ地データベース</span>
          </button>
          <button class="sidebar-item" data-route="/sns-ideas" data-page="sns-ideas">
            <span class="material-symbols-outlined">lightbulb</span>
            <span class="item-label">SNSネタ帳</span>
          </button>
          <button class="sidebar-item" data-route="/instagram" data-page="instagram">
            <span class="material-symbols-outlined">photo_library</span>
            <span class="item-label">Instagram保存</span>
          </button>
          <button class="sidebar-item" data-route="/subscriptions" data-page="subscriptions">
            <span class="material-symbols-outlined">card_membership</span>
            <span class="item-label">サブスク管理</span>
          </button>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user" id="sidebarUser">
          <div class="avatar">
            <span class="material-symbols-outlined">person</span>
          </div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name">ユーザー</div>
            <div class="sidebar-user-email">loading...</div>
          </div>
          <button class="btn-icon" id="themeToggle" title="テーマ切替">
            <span class="material-symbols-outlined">dark_mode</span>
          </button>
        </div>
        <button class="sidebar-logout-btn" id="logoutBtn">
          <span class="material-symbols-outlined">logout</span>
          <span>ログアウト</span>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Top Bar -->
      <header class="topbar" id="topbar">
        <div class="topbar-left">
          <button class="btn-icon topbar-menu-btn" id="menuToggle">
            <span class="material-symbols-outlined">menu</span>
          </button>
          <h1 class="topbar-title" id="topbarTitle">ダッシュボード</h1>
        </div>
        <div class="topbar-right">
          <div class="search-bar" id="globalSearch">
            <span class="material-symbols-outlined">search</span>
            <input type="text" placeholder="検索..." id="globalSearchInput">
          </div>
          <button class="btn-icon" id="notificationBtn" title="通知">
            <span class="material-symbols-outlined">notifications</span>
          </button>
          <button class="btn-icon" id="settingsBtn" title="設定">
            <span class="material-symbols-outlined">settings</span>
          </button>
        </div>
      </header>

      <!-- Page Container -->
      <div class="page-content" id="pageContent">
        <!-- Pages are rendered here by the router -->
      </div>
    </main>

    <!-- Snackbar Container -->
    <div class="snackbar-container" id="snackbarContainer"></div>

    <!-- Modal Backdrop -->
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <!-- Modal -->
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">タイトル</h2>
        <button class="btn-icon" id="modalClose">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
